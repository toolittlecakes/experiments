<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibecoding</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --sidebar-bg: #1a1a1a;
            --main-bg: #f0f0f0;
            --text-color: #e0e0e0;
            --input-bg: #2a2a2a;
            --border-color: #333;
            --accent-color: #007bff;
            --user-msg-bg: #2c3e50;
            --assistant-msg-bg: #252525;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--sidebar-bg);
        }

        #app-container {
            display: flex;
            height: 100%;
        }

        #sidebar {
            width: 350px;
            min-width: 300px;
            background-color: var(--sidebar-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            box-sizing: border-box;
            border-right: 1px solid var(--border-color);
        }

        #sidebar.collapsed {
            width: 52px;
            min-width: 52px;
            padding: 0.5rem;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        #sidebar h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .sidebar-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-height: 0;
        }

        #sidebar.collapsed h1,
        #sidebar.collapsed .sidebar-content {
            display: none;
        }

        #sidebar.collapsed .sidebar-header {
            justify-content: center;
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        #sidebarToggle {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            cursor: pointer;
            padding: 0.35rem 0.5rem;
            font-size: 0.8rem;
            line-height: 1;
            white-space: nowrap;
        }

        #sidebarToggle:hover {
            background-color: #333;
        }

        @media (max-width: 700px) {
            #sidebar {
                width: 88vw;
                min-width: 88vw;
            }
        }

        .endpoint-selector-container,
        .api-key-container,
        .model-selector-container {
            margin-bottom: 1rem;
        }

        .endpoint-selector-container label,
        .api-key-container label,
        .model-selector-container label {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 0.25rem;
            display: block;
        }

        #endpointSelect,
        #apiKeyInput,
        #modelSelect {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            box-sizing: border-box;
        }

        #endpointSelect,
        #modelSelect {
            cursor: pointer;
        }

        #endpointSelect option,
        #modelSelect option {
            background-color: var(--input-bg);
            color: var(--text-color);
        }

        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Simple scrollbar styling */
        #chat-messages::-webkit-scrollbar { width: 6px; }
        #chat-messages::-webkit-scrollbar-track { background: var(--input-bg); }
        #chat-messages::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

        .message {
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user {
            background-color: var(--user-msg-bg);
            margin-left: 20px;
        }

        .message.assistant {
            background-color: var(--assistant-msg-bg);
        }

        .message.system {
            background-color: #3d3d3d;
            font-style: italic;
            font-size: 0.9em;
            color: #ccc;
        }

        .message strong {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #999;
        }

        #chat-form {
            display: flex;
            margin-top: 1rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
        }

        #chat-input {
            flex-grow: 1;
            padding: 0.75rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px 0 0 4px;
            resize: none;
            font-family: inherit;
        }

        #chat-form button {
            padding: 0.75rem 1rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
        }
        #chat-form button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        #main-content {
            flex-grow: 1;
            background-color: var(--main-bg);
        }

        #app-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Styling for code blocks inside messages */
        .message pre {
            background-color: #111;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message code {
            font-family: "Courier New", Courier, monospace;
            font-size: 0.9em;
        }

    </style>
</head>
<body>

    <div id="app-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <h1>Vibecoding</h1>
                <button type="button" id="sidebarToggle" aria-controls="sidebar" aria-expanded="true">Hide</button>
            </div>
            <div class="sidebar-content">
                <div class="endpoint-selector-container">
                    <label for="endpointSelect">Endpoint</label>
                    <select id="endpointSelect">
                        <option value="openrouter">OpenRouter + Cerebras</option>
                        <option value="cerebras">Cerebras API</option>
                    </select>
                </div>
                <div class="api-key-container">
                    <label for="apiKeyInput" id="apiKeyLabel">OpenRouter API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="Enter your key here">
                </div>
                <div class="model-selector-container">
                    <label for="modelSelect">Model</label>
                    <select id="modelSelect">
                        <option value="">Loading models...</option>
                    </select>
                </div>
                <div id="chat-messages"></div>
                <form id="chat-form">
                    <textarea id="chat-input" placeholder="Describe the changes you want..." rows="3"></textarea>
                    <button type="submit" id="send-button">Send</button>
                </form>
            </div>
        </div>
        <div id="main-content">
            <iframe id="app-iframe" title="Live Application Preview"></iframe>
        </div>
    </div>

    <script>
        // --- DOM Elements ---
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const endpointSelect = document.getElementById('endpointSelect');
        const apiKeyLabel = document.getElementById('apiKeyLabel');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const modelSelect = document.getElementById('modelSelect');
        const chatMessages = document.getElementById('chat-messages');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-button');
        const appIframe = document.getElementById('app-iframe');

        // --- State Management ---
        const ENDPOINTS = {
            openrouter: {
                label: 'OpenRouter + Cerebras',
                apiKeyLabel: 'OpenRouter API Key',
                apiKeyStorageKey: 'vibecoding_openrouter_apiKey',
                modelStorageKey: 'vibecoding_openrouter_selectedModel',
                defaultModel: 'openai/gpt-oss-120b',
                modelIds: [
                    'z-ai/glm-4.7',
                    'openai/gpt-oss-120b',
                    'qwen/qwen3-235b-a22b-2507',
                    'meta-llama/llama-3.1-8b-instruct'
                ],
                modelsUrl: 'https://openrouter.ai/api/v1/models',
                chatUrl: 'https://openrouter.ai/api/v1/chat/completions',
                requiresKeyForModels: false,
                bodyExtras: { provider: { only: ['cerebras'] } }
            },
            cerebras: {
                label: 'Cerebras API',
                apiKeyLabel: 'Cerebras API Key',
                apiKeyStorageKey: 'vibecoding_cerebras_apiKey',
                modelStorageKey: 'vibecoding_cerebras_selectedModel',
                defaultModel: 'gpt-oss-120b',
                modelsUrl: 'https://api.cerebras.ai/public/v1/models',
                chatUrl: 'https://api.cerebras.ai/v1/chat/completions',
                requiresKeyForModels: false,
                bodyExtras: {}
            }
        };
        let selectedEndpoint = localStorage.getItem('vibecoding_endpoint') || 'openrouter';
        if (!ENDPOINTS[selectedEndpoint]) {
            selectedEndpoint = 'openrouter';
        }
        let apiKey = '';
        let selectedModel = '';
        let chatHistory = [];
        let currentAppCode = '';
        let isLoading = false;
        let sidebarCollapsed = getInitialSidebarCollapsed();

        // --- Initial Application Code ---
        const initialAppCode = `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibecoding App</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <script type="module" src="https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js"><\/script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 flex items-center justify-center h-screen">
    <div class="text-center p-4">
        <h1 class="text-4xl font-bold text-gray-800 dark:text-white">Welcome to your App!</h1>
        <p class="mt-2 text-lg text-gray-600 dark:text-gray-300">Tell me what you want to build in the chat on the left.</p>
    </div>
</body>
</html>`;

        // --- Core Functions ---

        /**
         * Updates the iframe with the provided HTML code.
         * @param {string} code The HTML code to render.
         */
        function updateIframe(code) {
            currentAppCode = code;
            appIframe.srcdoc = code;
        }

        /**
         * Adds a message to the chat UI.
         * @param {string} role - 'user', 'assistant', or 'system'.
         * @param {string} content - The message content.
         */
        function addMessageToChat(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role);

            let roleDisplay = role.charAt(0).toUpperCase() + role.slice(1);

            // Use marked.js to render markdown, especially for code blocks
            const renderedContent = marked.parse(`<strong>${roleDisplay}</strong>${content}`);
            messageDiv.innerHTML = renderedContent;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        /**
         * Extracts the HTML code from the LLM's response.
         * @param {string} responseText - The full response from the LLM.
         * @returns {string|null} The extracted HTML code or null if not found.
         */
        function extractHtmlCode(responseText) {
            const match = /```html\n([\s\S]*?)\n```/.exec(responseText);
            return match ? match[1] : null;
        }

        /**
         * Toggles the loading state of the UI.
         */
        function setLoading(loading) {
            isLoading = loading;
            chatInput.disabled = loading;
            sendButton.disabled = loading;
            sendButton.textContent = loading ? '...' : 'Send';
        }

        /**
         * Simple token estimation function
         * @param {string} text - Text to estimate tokens for
         * @returns {number} Estimated token count
         */
        function estimateTokens(text) {
            // Rough estimation: ~4 characters per token for English text
            return Math.ceil(text.length / 4);
        }

        function getInitialSidebarCollapsed() {
            const stored = localStorage.getItem('vibecoding_sidebarCollapsed');
            if (stored !== null) {
                return stored === 'true';
            }
            return window.matchMedia('(max-width: 700px)').matches;
        }

        function syncSidebarState() {
            sidebar.classList.toggle('collapsed', sidebarCollapsed);
            sidebarToggle.textContent = sidebarCollapsed ? 'Show' : 'Hide';
            sidebarToggle.setAttribute('aria-expanded', String(!sidebarCollapsed));
            localStorage.setItem('vibecoding_sidebarCollapsed', String(sidebarCollapsed));
        }

        function getEndpointConfig() {
            return ENDPOINTS[selectedEndpoint] || ENDPOINTS.openrouter;
        }

        function getStoredApiKey(config) {
            return localStorage.getItem(config.apiKeyStorageKey) || (selectedEndpoint === 'openrouter' ? localStorage.getItem('vibecoding_apiKey') : '') || '';
        }

        function getStoredModel(config) {
            return localStorage.getItem(config.modelStorageKey) || (selectedEndpoint === 'openrouter' ? localStorage.getItem('vibecoding_selectedModel') : '') || config.defaultModel;
        }

        function getAuthToken() {
            return apiKey.trim();
        }

        function syncEndpointInputs() {
            const config = getEndpointConfig();
            apiKey = getStoredApiKey(config);
            selectedModel = getStoredModel(config);
            endpointSelect.value = selectedEndpoint;
            apiKeyLabel.textContent = config.apiKeyLabel;
            apiKeyInput.value = apiKey;
            apiKeyInput.placeholder = `Enter your ${config.label} key`;
        }

        function renderModelOptions(models) {
            modelSelect.innerHTML = '';
            for (const model of models) {
                const option = document.createElement('option');
                option.value = model.id;
                option.textContent = model.name || model.id;
                modelSelect.appendChild(option);
            }
        }

        async function loadModels() {
            const config = getEndpointConfig();
            modelSelect.disabled = true;
            modelSelect.innerHTML = '<option value="">Loading models...</option>';

            if (config.requiresKeyForModels && !apiKey) {
                modelSelect.innerHTML = '<option value="">Set API key to load models</option>';
                return;
            }

            try {
                const authToken = getAuthToken();
                const headers = config.requiresKeyForModels && authToken ? { Authorization: `Bearer ${authToken}` } : {};
                const response = await fetch(config.modelsUrl, { headers });
                if (!response.ok) {
                    throw new Error(`Models HTTP error! status: ${response.status}`);
                }

                const payload = await response.json();
                const allowedModelIds = config.modelIds ? new Set(config.modelIds) : null;
                const models = (payload.data || [])
                    .filter((model) => model.id)
                    .filter((model) => !allowedModelIds || allowedModelIds.has(model.id))
                    .sort((a, b) => (a.name || a.id).localeCompare(b.name || b.id));

                if (models.length === 0) {
                    modelSelect.innerHTML = '<option value="">No models returned</option>';
                    return;
                }

                renderModelOptions(models);
                if (!models.some((model) => model.id === selectedModel)) {
                    selectedModel = models.some((model) => model.id === config.defaultModel) ? config.defaultModel : models[0].id;
                    localStorage.setItem(config.modelStorageKey, selectedModel);
                }
                modelSelect.value = selectedModel;
                modelSelect.disabled = false;
            } catch (error) {
                console.error('Models API Error:', error);
                modelSelect.innerHTML = `<option value="">${error.message}</option>`;
            }
        }

        /**
         * Marks the last user message as completed with a checkmark and stats.
         * @param {number} duration - API call duration in milliseconds
         * @param {number} inputTokens - Estimated input tokens
         * @param {number} outputTokens - Estimated output tokens
         */
        function markUserMessageCompleted(duration = 0, inputTokens = 0, outputTokens = 0) {
            const userMessages = chatMessages.querySelectorAll('.message.user');
            if (userMessages.length > 0) {
                const lastUserMessage = userMessages[userMessages.length - 1];
                if (!lastUserMessage.querySelector('.completion-check')) {
                    const statsContainer = document.createElement('div');
                    statsContainer.classList.add('completion-check');
                    statsContainer.style.color = '#4CAF50';
                    statsContainer.style.fontWeight = 'bold';
                    statsContainer.style.fontSize = '0.7rem';
                    statsContainer.style.marginTop = '8px';
                    statsContainer.style.display = 'flex';
                    statsContainer.style.alignItems = 'center';
                    statsContainer.style.gap = '8px';

                    const checkmark = document.createElement('span');
                    checkmark.innerHTML = '✓';
                    checkmark.style.fontSize = '1rem';

                    const stats = document.createElement('span');
                    stats.style.color = '#888';
                    stats.innerHTML = `${duration}ms | ${inputTokens}→${outputTokens} tokens`;

                    statsContainer.appendChild(checkmark);
                    statsContainer.appendChild(stats);
                    lastUserMessage.appendChild(statsContainer);
                }
            }
        }

        /**
         * Handles the chat form submission.
         * @param {Event} event - The form submission event.
         */
        async function handleFormSubmit(event) {
            event.preventDefault();
            if (isLoading) return;

            const userInput = chatInput.value.trim();
            if (!userInput) return;

            const config = getEndpointConfig();
            const authToken = getAuthToken();
            if (!authToken) {
                addMessageToChat('system', `Error: Please set your ${config.label} API key first.`);
                return;
            }

            setLoading(true);
            addMessageToChat('user', userInput);
            chatHistory.push({ role: 'user', content: userInput });
            chatInput.value = '';

            try {
                // Start timer
                const startTime = performance.now();

                const systemPrompt = `You are an expert web developer. Your task is to build a web application based on user requests.
You will be given the user's request and the current full HTML code of the application.
You must return the COMPLETE, new HTML code for the application that incorporates the user's request.
DO NOT provide explanations, comments, or any text outside of the HTML code block.
Your response MUST be a single markdown code block of type 'html'.
The application should use Tailwind CSS for styling and Lit for interactive web components, both of which are already included via CDN in the initial code.
Always return the full HTML document, from <!DOCTYPE html> to </html>.`;

                const messagesForApi = [
                    { role: 'system', content: systemPrompt },
                    ...chatHistory,
                    {
                        role: 'user',
                        // **FIXED HERE**: Escaped the backticks for the markdown code fence
                        content: `Here is my request: "${userInput}".\n\nHere is the current application code:\n\`\`\`html\n${currentAppCode}\n\`\`\``
                    }
                ];

                // Calculate input tokens
                const inputText = messagesForApi.map(msg => msg.content).join('');
                const inputTokens = estimateTokens(inputText);

                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${authToken}`
                };
                if (selectedEndpoint === 'openrouter') {
                    headers['HTTP-Referer'] = window.location.origin;
                    headers['X-Title'] = 'Vibecoding';
                }

                const response = await fetch(config.chatUrl, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: messagesForApi,
                        temperature: 0.2,
                        ...config.bodyExtras
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const completion = await response.json();

                // Calculate duration and output tokens
                const endTime = performance.now();
                const duration = Math.round(endTime - startTime);

                const assistantResponse = completion.choices[0].message.content;
                const outputTokens = estimateTokens(assistantResponse);
                const newHtmlCode = extractHtmlCode(assistantResponse);

                if (newHtmlCode) {
                    updateIframe(newHtmlCode);
                    // Don't add to chat history or display the code
                    // Just mark the user message as completed with stats
                    markUserMessageCompleted(duration, inputTokens, outputTokens);
                } else {
                    addMessageToChat('system', `Error: The model did not return valid HTML code. Here is the raw response:\n\n${assistantResponse}`);
                    // Don't add the failed response to history to allow for a retry
                }

            } catch (error) {
                console.error('API Error:', error);
                addMessageToChat('system', `An API error occurred: ${error.message}`);
            } finally {
                setLoading(false);
                chatInput.focus();
            }
        }

        // --- Event Listeners ---
        sidebarToggle.addEventListener('click', () => {
            sidebarCollapsed = !sidebarCollapsed;
            syncSidebarState();
        });

        endpointSelect.addEventListener('change', (e) => {
            selectedEndpoint = e.target.value;
            localStorage.setItem('vibecoding_endpoint', selectedEndpoint);
            syncEndpointInputs();
            loadModels();
        });

        apiKeyInput.addEventListener('input', (e) => {
            apiKey = e.target.value;
            localStorage.setItem(getEndpointConfig().apiKeyStorageKey, apiKey);
        });

        apiKeyInput.addEventListener('change', () => {
            apiKey = apiKey.trim();
            apiKeyInput.value = apiKey;
            localStorage.setItem(getEndpointConfig().apiKeyStorageKey, apiKey);
            loadModels();
        });

        apiKeyInput.addEventListener('blur', () => {
            apiKey = apiKey.trim();
            apiKeyInput.value = apiKey;
            localStorage.setItem(getEndpointConfig().apiKeyStorageKey, apiKey);
            loadModels();
        });

        modelSelect.addEventListener('change', (e) => {
            selectedModel = e.target.value;
            localStorage.setItem(getEndpointConfig().modelStorageKey, selectedModel);
        });

        chatForm.addEventListener('submit', handleFormSubmit);

        // Allow Shift+Enter for new lines, Enter to submit
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleFormSubmit(e);
            }
        });

        // --- Initialization ---
        function initialize() {
            syncSidebarState();
            syncEndpointInputs();
            loadModels();
            updateIframe(initialAppCode);
            addMessageToChat('system', 'Welcome to Vibecoding! Select an endpoint, set its API key, select a model, then describe what you want to build.');
        }

        initialize();

    </script>
</body>
</html>
